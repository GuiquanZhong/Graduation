server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_forum?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: xxxxxx
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: xxxxxx
  expiration: 86400000  # 24小时 (ms)

# MiniMax AI 配置
ai:
  api-url: https://api.minimaxi.com/v1/text/chatcompletion_v2
  api-key: xxxxxx
  model: M2-her

# 阿里云 OSS 配置（请填入你的 AccessKey）
aliyun:
  oss:
    endpoint: oss-cn-shenzhen.aliyuncs.com
    access-key-id: xxxxxx
    access-key-secret: xxxxxx
    bucket-name: zhonggq
    # 文件访问域名（外网访问）
    url-prefix: https://zhonggq.oss-cn-shenzhen.aliyuncs.com/
